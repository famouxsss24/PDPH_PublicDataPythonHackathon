<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#eef2ef">
  <title>그늘로 3D - 건물 높이와 시간별 그림자</title>
  <link rel="preconnect" href="https://a.basemaps.cartocdn.com" crossorigin>
  <link rel="dns-prefetch" href="https://b.basemaps.cartocdn.com">
  <link rel="dns-prefetch" href="https://c.basemaps.cartocdn.com">
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css">
  <link rel="stylesheet" href="./css/tokens.css">
  <link rel="stylesheet" href="./css/3d.css">
</head>
<body>
  <main id="map" aria-label="노원구 건물 높이와 시간별 그림자 3D 지도"></main>

  <section class="scene-panel" aria-label="3D 그림자 시간 제어">
    <header>
      <a class="brand" href="./" aria-label="그늘로 경로 지도로 돌아가기">
        <span class="brand-mark"><i data-lucide="route"></i></span>
        <span><strong>그늘로</strong><small>3D SHADE MAP</small></span>
      </a>
      <span class="scene-badge">건물 높이 기반</span>
    </header>

    <div class="scene-time">
      <span>
        <p>그림자 시각</p>
        <strong id="clock">14:00</strong>
      </span>
      <span id="sunCompass" class="sun-compass" aria-hidden="true">
        <i data-lucide="sun"></i><b></b>
      </span>
    </div>
    <small id="sunMeta">태양 위치를 불러오는 중</small>

    <input id="frameRange" type="range" min="7" max="18" step="0.25" value="14" aria-label="3D 그림자 시각">
    <div class="frame-ticks" aria-hidden="true"><span>07</span><span>12</span><span>18</span></div>

    <div class="scene-actions">
      <button id="play" class="primary-command" type="button" aria-pressed="false">
        <i data-lucide="play"></i><span>시간 재생</span>
      </button>
      <button id="orbit" class="icon-command" type="button" aria-label="시점 자동 회전" aria-pressed="false" title="시점 자동 회전">
        <i data-lucide="rotate-3d"></i>
      </button>
      <button id="themeToggle" class="icon-command" type="button" aria-label="라이트 모드로 전환" aria-pressed="true" title="라이트 모드로 전환">
        <i data-lucide="sun"></i>
      </button>
    </div>

    <a id="returnToRoute" class="return-command" href="./">
      <i data-lucide="arrow-left"></i>
      <span><strong>2D 경로 지도로 돌아가기</strong><small>선택한 경로 화면을 이어서 봅니다</small></span>
    </a>

    <div id="routeEvidence" class="route-summary-3d" hidden></div>
    <p id="loadStatus" class="load-status">3D 데이터를 준비하고 있습니다.</p>
  </section>

  <aside class="height-legend" aria-label="건물 높이 범례">
    <header><strong>건물 높이</strong><i data-lucide="building-2"></i></header>
    <span class="height-scale" aria-hidden="true"></span>
    <div><span>3m</span><span>45m</span><span>90m+</span></div>
    <p id="buildingHover">건물을 가리키면 높이와 층수를 표시합니다.</p>
  </aside>

  <div class="map-error" id="mapError" role="alert" hidden></div>

  <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
  <script type="module" src="./js/3d.js?v=20260715c"></script>
</body>
</html>
